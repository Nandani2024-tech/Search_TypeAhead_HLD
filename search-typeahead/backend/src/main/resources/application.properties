spring.application.name=search


# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/typeahead
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Dataset Configuration
dataset.file.path=src/main/resources/data/queries_aggregated.csv

# Performance Tweaks for Batch Inserts
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

# Batch Write Configuration
search.batch.flush.interval=10000
search.batch.max.size=1000
